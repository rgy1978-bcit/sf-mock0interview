<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="description" content="Premia Vantage Careers — AI mock interview practice tailored to any job description." />
    <title>Mock Interview | Premia Vantage Careers</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --color-text-primary: #111827;
        --color-text-secondary: #6b7280;
        --color-text-tertiary: #9ca3af;
        --color-background-primary: #FAF9F5;
        --color-background-secondary: #ffffff;
        --color-border-tertiary: #e5e7eb;
        --color-border-secondary: #d1d5db;
        --border-radius-lg: 12px;
        --border-radius-md: 8px;
        --premia-primary: #1e293b;
        --premia-accent: #B8935A;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
      }
      button:focus-visible, [role="button"]:focus-visible, a:focus-visible {
        outline: 2px solid #B8935A;
        outline-offset: 2px;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      @keyframes avatarBreath {
        0%, 100% { transform: scale(1.03); }
        50%      { transform: scale(1.055); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
